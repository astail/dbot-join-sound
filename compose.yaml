services:
  bot:
    build:
      context: .
    init: true
    restart: unless-stopped
    depends_on:
      - voicevox
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN must be set in .env}
      PLAYBACK_VOLUME: ${PLAYBACK_VOLUME:-0.4}
      VOICEVOX_VOLUME: ${VOICEVOX_VOLUME:-0.8}
      VOICEVOX_URL: ${VOICEVOX_URL:-http://voicevox:50021}
      VOICEVOX_SPEAKER: ${VOICEVOX_SPEAKER:-14}
      VOICEVOX_TIMEOUT_MS: ${VOICEVOX_TIMEOUT_MS:-10000}
    volumes:
      - sounds:/app/sounds

  # 未登録ユーザーの入室読み上げ用。ポートは公開せず bot からのみ参照する
  voicevox:
    image: voicevox/voicevox_engine:cpu-0.25.2
    init: true
    restart: unless-stopped

volumes:
  sounds:
