name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  docker:
    name: docker
    runs-on: ubuntu-latest
    # compose.yaml の ${DISCORD_TOKEN:?} を解決するためのダミー。実トークンは不要
    env:
      DISCORD_TOKEN: dummy-token-for-ci
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose config
        run: docker compose config

      - name: Build image
        run: docker compose build
